{% extends 'base.html' %}

{% block title %}{{ 'Editar' if categoria else 'Nueva' }} Categoría{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('categorias.lista') }}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h2 class="mb-0">
                {{ 'Editar categoría' if categoria else 'Nueva categoría' }}
            </h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control"
                               value="{{ categoria.nombre if categoria else '' }}"
                               placeholder="Ej: Electrónica" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                        <textarea id="descripcion" name="descripcion" class="form-control"
                                  rows="3" placeholder="Descripción opcional">{{ categoria.descripcion if categoria and categoria.descripcion else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>
                            {{ 'Guardar cambios' if categoria else 'Crear categoría' }}
                        </button>
                        <a href="{{ url_for('categorias.lista') }}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}

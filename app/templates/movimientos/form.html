{% extends 'base.html' %}

{% block title %}Registrar Movimiento{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('movimientos.lista') }}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h2 class="mb-0">Registrar movimiento</h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">

                    <div class="mb-3">
                        <label for="producto_id" class="form-label fw-semibold">Producto <span class="text-danger">*</span></label>
                        <select id="producto_id" name="producto_id" class="form-select" required>
                            <option value="">— Selecciona un producto —</option>
                            {% for p in productos %}
                                <option value="{{ p.id }}">
                                    {{ p.nombre }} (stock actual: {{ p.stock }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tipo <span class="text-danger">*</span></label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo"
                                       id="tipo_entrada" value="entrada" checked>
                                <label class="form-check-label text-success fw-semibold" for="tipo_entrada">
                                    <i class="bi bi-arrow-down-circle me-1"></i>Entrada
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo"
                                       id="tipo_salida" value="salida">
                                <label class="form-check-label text-danger fw-semibold" for="tipo_salida">
                                    <i class="bi bi-arrow-up-circle me-1"></i>Salida
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="cantidad" class="form-label fw-semibold">Cantidad <span class="text-danger">*</span></label>
                        <input type="number" id="cantidad" name="cantidad" class="form-control"
                               value="1" min="1" required>
                    </div>

                    <div class="mb-4">
                        <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                        <input type="text" id="descripcion" name="descripcion" class="form-control"
                               placeholder="Ej: Compra a proveedor, Venta #123...">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Registrar
                        </button>
                        <a href="{{ url_for('movimientos.lista') }}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}

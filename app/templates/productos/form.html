{% extends 'base.html' %}

{% block title %}{{ 'Editar' if producto else 'Nuevo' }} Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">

        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('productos.lista') }}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h2 class="mb-0">
                {{ 'Editar producto' if producto else 'Nuevo producto' }}
            </h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">

                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control"
                               value="{{ producto.nombre if producto else '' }}"
                               placeholder="Ej: Taladro percutor" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                        <textarea id="descripcion" name="descripcion" class="form-control"
                                  rows="2" placeholder="Descripción opcional">{{ producto.descripcion if producto and producto.descripcion else '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="categoria_id" class="form-label fw-semibold">Categoría</label>
                        <select id="categoria_id" name="categoria_id" class="form-select">
                            <option value="">— Sin categoría —</option>
                            {% for cat in categorias %}
                                <option value="{{ cat.id }}"
                                    {% if producto and producto.categoria_id == cat.id %}selected{% endif %}>
                                    {{ cat.nombre }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-4">
                            <label for="precio" class="form-label fw-semibold">Precio <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" id="precio" name="precio" class="form-control"
                                       value="{{ '%.2f' % producto.precio if producto else '0.00' }}"
                                       min="0" step="0.01" required>
                            </div>
                        </div>
                        <div class="col-sm-4">
                            <label for="stock" class="form-label fw-semibold">Stock actual <span class="text-danger">*</span></label>
                            <input type="number" id="stock" name="stock" class="form-control"
                                   value="{{ producto.stock if producto else 0 }}"
                                   min="0" required>
                        </div>
                        <div class="col-sm-4">
                            <label for="stock_minimo" class="form-label fw-semibold">
                                Stock mínimo
                                <i class="bi bi-info-circle text-muted"
                                   title="Alerta de bajo stock cuando el stock llegue a este valor"
                                   data-bs-toggle="tooltip"></i>
                            </label>
                            <input type="number" id="stock_minimo" name="stock_minimo" class="form-control"
                                   value="{{ producto.stock_minimo if producto else 5 }}"
                                   min="0">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>
                            {{ 'Guardar cambios' if producto else 'Crear producto' }}
                        </button>
                        <a href="{{ url_for('productos.lista') }}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

<script>
    // Activa los tooltips de Bootstrap
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
        new bootstrap.Tooltip(el)
    })
</script>
{% endblock %}

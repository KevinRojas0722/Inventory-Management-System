<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventario{% endblock %} — Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <!-- Aplica el tema antes de renderizar para evitar flash -->
    <script>
        const tema = localStorage.getItem('tema') || 'light';
        document.documentElement.setAttribute('data-bs-theme', tema);
    </script>
</head>
<body>
<div class="wrapper">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
        <a class="sidebar-brand" href="{{ url_for('main.dashboard') }}">
            <div class="brand-icon"><i class="bi bi-box-seam"></i></div>
            Inventario
        </a>

        <nav class="sidebar-nav">
            <div class="sidebar-section-label">General</div>

            <a class="nav-link {% if request.blueprint == 'main' %}activo{% endif %}"
               href="{{ url_for('main.dashboard') }}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <div class="sidebar-section-label mt-2">Gestión</div>

            <a class="nav-link {% if request.blueprint == 'productos' %}activo{% endif %}"
               href="{{ url_for('productos.lista') }}">
                <i class="bi bi-box-seam"></i> Productos
            </a>

            <a class="nav-link {% if request.blueprint == 'movimientos' %}activo{% endif %}"
               href="{{ url_for('movimientos.lista') }}">
                <i class="bi bi-arrow-left-right"></i> Movimientos
            </a>

            <a class="nav-link {% if request.blueprint == 'categorias' %}activo{% endif %}"
               href="{{ url_for('categorias.lista') }}">
                <i class="bi bi-tags"></i> Categorías
            </a>
        </nav>

        <!-- Botón de modo oscuro al fondo del sidebar -->
        <div class="sidebar-footer">
            <button class="btn-tema" id="btnTema" onclick="toggleTema()">
                <i class="bi bi-moon" id="iconoTema"></i>
                <span id="labelTema">Modo oscuro</span>
            </button>
        </div>
    </aside>

    <!-- ── Contenido principal ── -->
    <div class="main-content">

        <!-- Barra superior solo en móvil -->
        <div class="topbar-mobile">
            <button class="btn btn-sm btn-dark me-3" id="btnSidebar">
                <i class="bi bi-list fs-5"></i>
            </button>
            <span class="text-white fw-semibold">Inventario</span>
        </div>

        <main>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Toggle dark/light mode ──────────────────
    function toggleTema() {
        const html    = document.documentElement;
        const actual  = html.getAttribute('data-bs-theme');
        const nuevo   = actual === 'dark' ? 'light' : 'dark';

        html.setAttribute('data-bs-theme', nuevo);
        localStorage.setItem('tema', nuevo);
        actualizarBoton(nuevo);
    }

    function actualizarBoton(tema) {
        const icono = document.getElementById('iconoTema');
        const label = document.getElementById('labelTema');
        if (tema === 'dark') {
            icono.className = 'bi bi-sun';
            label.textContent = 'Modo claro';
        } else {
            icono.className = 'bi bi-moon';
            label.textContent = 'Modo oscuro';
        }
    }

    // Sincroniza el botón con el tema actual al cargar
    actualizarBoton(localStorage.getItem('tema') || 'light');

    // ── Toggle sidebar en móvil ─────────────────
    const btnSidebar = document.getElementById('btnSidebar');
    const sidebar    = document.getElementById('sidebar');
    if (btnSidebar) {
        btnSidebar.addEventListener('click', () => sidebar.classList.toggle('abierto'));
    }
</script>
</body>
</html>
